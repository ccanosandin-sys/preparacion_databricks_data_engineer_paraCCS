bundle:
  name: ecomotive_project

# ==============================================================================
# CONFIGURACIÓN DE ENTORNOS (TARGETS)
# Aquí definimos que ambos entornos viven en TU mismo Workspace
# ==============================================================================
targets:
  # --- ENTORNO DEV ---
  dev:
    mode: development
    default: true
    workspace:
      host: https://dbc-5716a166-5f03.cloud.databricks.com

  # --- ENTORNO PROD (Simulado en el mismo workspace) ---
  prod:
    mode: production
    workspace:
      # Usamos EL MISMO host que en desarrollo
      host: https://dbc-5716a166-5f03.cloud.databricks.com
    
    # He comentado esto para que te funcione con tu usuario personal.
    # En una empresa real, descomentarías esto para usar la identidad robot.
    # run_as:
    #   service_principal_name: "sp-ecomotive-prod-uuid"

resources:
  # --------------------------------------------------------------------------
  # A. DEFINICIÓN DEL PIPELINE (La Máquina)
  # --------------------------------------------------------------------------
  pipelines:
    ecomotive_pipeline_dlt:
      # El nombre cambiará automáticamente: "[dev]..." o "[prod]..."
      name: "[${bundle.target}] Ecomotive Pipeline"
      
      libraries:
        - notebook:
            path: ./src/Module_3_01_DLT_Pipeline_Ecomotive.ipynb

      # AQUÍ ESTÁ LA CLAVE DEL AISLAMIENTO DE DATOS
      # Aunque estés en el mismo workspace, los datos no se mezclan.
      # Dev escribirá en: main.ecomotive_dev
      # Prod escribirá en: main.ecomotive_prod
      catalog: "ecomotive"
      target: "ecomotive_${bundle.target}"

      serverless: true

      configuration:
        bundle.sourcePath: /Volumes/ecomotive/landing/ecomotive_vol

      continuous: false

  # --------------------------------------------------------------------------
  # B. DEFINICIÓN DEL JOB (El Botón)
  # --------------------------------------------------------------------------
  jobs:
    ecomotive_trigger_job:
      name: "[${bundle.target}] Trigger Ecomotive"
      
      tasks:
        - task_key: refresh_pipeline
          pipeline_task:
            pipeline_id: ${resources.pipelines.ecomotive_pipeline_dlt.id}
            full_refresh: false